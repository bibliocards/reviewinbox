name: Deploy Site to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/site/**"
  workflow_dispatch:

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Build site
        env:
          PUBLIC_APP_URL: https://cloud.reviewinbox.app
        run: pnpm nx build site

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler pages deploy dist/apps/site --project-name reviewinbox --branch main
