services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reviewinbox}
      POSTGRES_USER: ${POSTGRES_USER:-reviewinbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.self-hosted}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/reviewinbox/api:${REVIEWINBOX_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-reviewinbox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reviewinbox}
      RUN_DB_MIGRATIONS_ON_STARTUP: "true"
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?Set APP_PUBLIC_URL in .env.self-hosted}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env.self-hosted}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env.self-hosted}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?Set BETTER_AUTH_TRUSTED_ORIGINS in .env.self-hosted}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY in .env.self-hosted}
      MAIL_FROM: ${MAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      AUTO_SYNC_REVIEWS_ENABLED: ${AUTO_SYNC_REVIEWS_ENABLED:-true}
      AUTO_SYNC_REVIEWS_SPREAD_WINDOW_MINUTES: ${AUTO_SYNC_REVIEWS_SPREAD_WINDOW_MINUTES:-60}
      UPLOAD_LOCAL_DIR: ${UPLOAD_LOCAL_DIR:-volumes/uploads}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
    volumes:
      - uploads:/usr/src/app/volumes/uploads
    ports:
      - "127.0.0.1:${REVIEWINBOX_API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/reviewinbox/worker:${REVIEWINBOX_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-reviewinbox}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reviewinbox}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?Set APP_PUBLIC_URL in .env.self-hosted}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?Set BETTER_AUTH_URL in .env.self-hosted}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:?Set BETTER_AUTH_TRUSTED_ORIGINS in .env.self-hosted}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY in .env.self-hosted}
      RUN_DB_MIGRATIONS_ON_STARTUP: "false"
      MAIL_FROM: ${MAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      AUTO_SYNC_REVIEWS_ENABLED: ${AUTO_SYNC_REVIEWS_ENABLED:-true}
      AUTO_SYNC_REVIEWS_SPREAD_WINDOW_MINUTES: ${AUTO_SYNC_REVIEWS_SPREAD_WINDOW_MINUTES:-60}
      UPLOAD_LOCAL_DIR: ${UPLOAD_LOCAL_DIR:-volumes/uploads}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      AI_MODEL: ${AI_MODEL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
    volumes:
      - uploads:/usr/src/app/volumes/uploads

  web:
    image: ghcr.io/reviewinbox/web:${REVIEWINBOX_VERSION:-latest}
    restart: unless-stopped
    environment:
      REVIEWINBOX_API_URL: ${REVIEWINBOX_API_URL:-}
      REVIEWINBOX_AUTH_BASE_PATH: ${REVIEWINBOX_AUTH_BASE_PATH:-/api/auth}
      REVIEWINBOX_AUTH_GOOGLE_ENABLED: ${REVIEWINBOX_AUTH_GOOGLE_ENABLED:-false}
      REVIEWINBOX_AUTH_SSO_ENABLED: ${REVIEWINBOX_AUTH_SSO_ENABLED:-false}
    ports:
      - "127.0.0.1:${REVIEWINBOX_WEB_PORT:-8080}:8080"

volumes:
  postgres-data:
  uploads:
