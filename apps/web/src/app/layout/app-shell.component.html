<div class="app-shell">
  <aside class="sidebar" aria-label="Primary navigation">
    <a class="brand" href="/" routerLink="/" aria-label="ReviewInbox home">
      <span class="brand-mark">R</span>
      <span class="brand-name">ReviewInbox</span>
    </a>

    <nav class="nav-list">
      @for (item of navItems; track item.route) {
        <a
          class="nav-item"
          href="{{ item.route }}"
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <i class="pi {{ item.icon }}" aria-hidden="true"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div class="organization-switcher">
        <span class="organization-mark">O</span>
        <span class="organization-name">Default organization</span>
      </div>

      <div class="topbar-actions">
        <p-button severity="secondary" class="search-button" icon="pi pi-search" label="search" />

        <p-button label="Connect app" size="small" />

        <p-button
          severity="secondary"
          class="theme-button"
          size="small"
          [attr.aria-label]="themeLabel()"
          [title]="themeLabel()"
          (click)="toggleTheme()"
          [icon]="themeIcon()" />

        <p-button label="TO" severity="secondary" class="owner-button" aria-label="Owner menu" />
      </div>
    </header>

    <main class="content-shell">
      <section class="content-container" aria-label="Current page">
        <router-outlet />
      </section>
    </main>
  </div>
</div>
