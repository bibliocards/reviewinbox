<div
  class="grid gap-4"
  *transloco="let t">
  <p class="m-0 text-sm text-ink-subtle">
    {{ t(data.mode === 'manual' ? 'replyInbox.dialog.manualDescription' : 'replyInbox.dialog.editDescription') }}
  </p>
  <label
    class="grid gap-2 text-sm font-medium text-ink"
    for="reply-draft-text">
    <span>{{ t('replyInbox.dialog.replyDraft') }}</span>
    <textarea
      id="reply-draft-text"
      class="min-h-48 w-full rounded-2xl border border-hairline bg-surface-1 p-3 text-sm font-normal leading-6 text-ink outline-none transition focus:border-primary focus:ring-2 focus:ring-primary/20"
      [formField]="draftForm.draftText"
      [attr.aria-describedby]="'reply-draft-help'"
      [placeholder]="t('replyInbox.dialog.placeholder')"></textarea>
  </label>
  <p
    id="reply-draft-help"
    class="m-0 text-xs leading-5 text-ink-subtle">
    {{ t('replyInbox.dialog.help') }}
  </p>
  <div class="flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
    <p-button
      severity="secondary"
      [text]="true"
      [label]="t('replyInbox.dialog.cancel')"
      (onClick)="cancel()" />
    <p-button
      severity="secondary"
      [label]="t('replyInbox.actions.saveDraft')"
      [disabled]="!canSubmit()"
      (onClick)="submit('save')" />
    <p-button
      [label]="t('replyInbox.actions.saveAndPublish')"
      [disabled]="!canSubmit()"
      icon="pi pi-send"
      (onClick)="submit('publish')" />
  </div>
</div>
