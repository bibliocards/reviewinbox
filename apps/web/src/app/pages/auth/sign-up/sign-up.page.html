<main class="min-h-screen bg-canvas px-5 py-6 text-ink">
  <header class="mx-auto flex max-w-[1920px] items-center justify-between gap-4">
    <a
      class="inline-flex items-center gap-3 text-ink no-underline"
      routerLink="/sign-up">
      <span class="grid size-9 place-items-center rounded-xl bg-primary text-sm font-bold text-primary-contrast">R</span>
      <span class="sr-only">ReviewInbox</span>
    </a>

    <div class="flex items-center gap-3">
      <ri-theme-toggle />

      <p-button
        variant="outlined"
        routerLink="/login">
        Sign in
      </p-button>
    </div>
  </header>

  <section class="mx-auto mt-10 w-full max-w-153 rounded-3xl border border-hairline bg-surface-1 px-6 py-8 sm:mt-14 sm:px-14 sm:py-10">
    <h1 class="m-0 text-xl font-semibold tracking-[-0.8px] text-ink sm:text-2xl">Create your ReviewInbox account</h1>
    <p class="mt-2 text-sm leading-5 text-ink-subtle">
      Set up the first Owner account and choose the Organization name for this ReviewInbox instance.
    </p>
    @if (capabilities.externalProviders) {
    <div class="mt-6 grid gap-2 sm:grid-cols-3">
      <p-button
        label="Google"
        icon="pi pi-google"
        severity="secondary"
        [disabled]="!capabilities.google"
        styleClass="w-full justify-center" />
      <p-button
        label="Apple"
        icon="pi pi-apple"
        severity="secondary"
        [disabled]="true"
        styleClass="w-full justify-center" />
      <p-button
        label="GitHub"
        icon="pi pi-github"
        severity="secondary"
        [disabled]="true"
        styleClass="w-full justify-center" />
    </div>

    <div class="mt-2">
      <p-button
        label="Continue with SSO"
        icon="pi pi-lock"
        severity="secondary"
        [disabled]="!capabilities.enterpriseSso"
        styleClass="w-full justify-center" />
    </div>

    <div class="my-6 flex items-center gap-4 text-sm text-ink-tertiary">
      <span class="h-px flex-1 bg-hairline"></span>
      or
      <span class="h-px flex-1 bg-hairline"></span>
    </div>
    }

    <form
      class="grid gap-4"
      (submit)="createAccount($event)">
      <label class="grid gap-1.5 text-sm font-medium text-ink">
        Name
        <input
          pInputText
          type="text"
          autocomplete="name"
          [formField]="signUpForm.name" />
      </label>

      <label class="grid gap-1.5 text-sm font-medium text-ink">
        Work email
        <input
          pInputText
          type="email"
          autocomplete="email"
          [formField]="signUpForm.email" />
      </label>

      <div class="grid gap-1.5 text-sm font-medium text-ink">
        <label for="sign-up-password">Password</label>
        <p-password
          inputId="sign-up-password"
          [formField]="signUpForm.password"
          autocomplete="new-password"
          [toggleMask]="true"
          [fluid]="true"
          inputStyleClass="w-full" />
      </div>

      <label class="grid gap-1.5 text-sm font-medium text-ink">
        Organization name
        <input
          pInputText
          type="text"
          autocomplete="organization"
          [formField]="signUpForm.organizationName" />
      </label>
      @if (errorMessage()) {
      <p class="m-0 rounded-xl border border-red-400 bg-surface-2 px-3 py-2 text-sm text-ink-muted">{{ errorMessage() }}</p>
      }

      <p-button
        type="submit"
        label="Create account"
        class="mt-1"
        [fluid]="true"
        [loading]="isSubmitting()"
        [disabled]="!canSubmit()" />
    </form>

    <p class="mt-7 text-center text-sm text-ink-subtle">
      Already have an account?
      <a
        class="font-medium text-linear-primary underline-offset-4 hover:underline"
        routerLink="/login"
        >Sign in</a
      >
    </p>
  </section>
</main>
