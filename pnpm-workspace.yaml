packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  nx: true

minimumReleaseAgeExclude:
  - '@angular-devkit/architect@0.2102.16'
  - '@angular-devkit/core@21.2.16'
  - '@angular-devkit/schematics@21.2.16'
  - '@angular/build@21.2.16'
  - '@angular/cli@21.2.16'
  - '@schematics/angular@21.2.16'
